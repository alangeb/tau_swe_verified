version: '3.8'

volumes:
  # Shared volatile storage for the downloaded chat template
  template-share:

services:
  # --- INIT CONTAINER: Downloads the template ---
  template-downloader:
    image: alpine:latest
    container_name: qwen-template-downloader
    volumes:
      - template-share:/tmp/chat-templates
    command: >
      sh -c "apk add --no-cache curl &&
             echo 'Downloading froggeric chat template...' &&
              curl -sL 'https://huggingface.co/froggeric/Qwen-Fixed-Chat-Templates/resolve/main/chat_template.jinja' -o /tmp/chat-templates/chat_template.jinja"

  # --- MAIN CONTAINER: vLLM Inference Engine ---
  qwen-vllm:
    image: vllm/vllm-openai:v0.22.1
    container_name: qwen36-27b-nvfp4-mtp
    ports:
      - "8000:8000"
    shm_size: '32gb'
    ipc: host
    restart: always
    depends_on:
      template-downloader:
        condition: service_completed_successfully # Only starts after download finishes
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - /home/alangeb/.cache/huggingface:/root/.cache/huggingface
      - template-share:/tmp/chat-templates # Mounts the shared volume containing the downloaded file
    environment:
      - VLLM_NVFP4_GEMM_BACKEND=flashinfer-cutlass
      - VLLM_USE_FLASHINFER_SAMPLER=1
      - VLLM_USE_DEEP_GEMM=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    command:
      - sakamakismile/Qwen3.6-27B-Text-NVFP4-MTP
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --served-model-name
      - model
      - --quantization
      - modelopt
      - --trust-remote-code
      - --language-model-only
      - --max-model-len
      - "200000"
      - --gpu-memory-utilization
      - "0.95"
      - --max-num-seqs
      - "2"
      - --max-num-batched-tokens
      - "2048"
      - --enable-chunked-prefill
      - --enable-prefix-caching
      - --kv-cache-dtype
      - fp8
      - --calculate-kv-scales
      - --reasoning-parser
      - qwen3
      - --tool-call-parser
      - qwen3_coder
      - --chat-template
      - /tmp/chat-templates/chat_template.jinja
      - --enable-auto-tool-choice
      - --enable-prompt-tokens-details
      - --speculative-config
      - '{"method":"qwen3_5_mtp","num_speculative_tokens":3}'
      - -tp
      - "1"
      - -pp
      - "1"
    
    # Watchdog implementation for hangs/engine death
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s     
      timeout: 10s      
      retries: 3        
      start_period: 300s 

